<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Text → QR Splitter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e2e0da;
    --border-strong: #c8c5be;
    --text: #1a1917;
    --text-muted: #6b6860;
    --text-faint: #9e9c97;
    --accent: #2d5be3;
    --accent-light: #eef1fd;
    --accent-dark: #1e3fa0;
    --mono: 'JetBrains Mono', 'Fira Mono', 'Courier New', monospace;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;
    --radius: 10px;
    --radius-lg: 16px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --border: #2e2d2a;
      --border-strong: #45443f;
      --text: #f0ede8;
      --text-muted: #9e9c97;
      --text-faint: #6b6860;
      --accent: #5b7ef5;
      --accent-light: #1a2045;
      --accent-dark: #7d9bf8;
    }
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page { max-width: 860px; margin: 0 auto; }
  header { margin-bottom: 2.5rem; }

  .wordmark {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 1rem;
  }

  h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 0.75rem;
  }

  .card-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }

  .card-label-row .card-label { margin-bottom: 0; }

  .btn-paste {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-light);
    border: 1px solid transparent;
    border-radius: 999px;
    padding: 5px 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .btn-paste:hover { background: var(--accent); color: #fff; }
  .btn-paste:active { transform: scale(0.97); }
  .btn-paste.pasted { background: #1f9d55; color: #fff; }

  .paste-hint {
    display: none;
    font-size: 11px;
    color: var(--text-faint);
    text-align: right;
    margin-top: -0.35rem;
    margin-bottom: 0.6rem;
  }

  @media (pointer: coarse) {
    .paste-hint { display: block; }
  }

  textarea {
    width: 100%;
    min-height: 180px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  textarea::placeholder { color: var(--text-faint); }

  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .field { display: flex; align-items: center; gap: 8px; }
  .field label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }

  input[type="number"] {
    width: 80px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-ghost { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--border-strong); color: var(--text); }
  .btn-sm { font-size: 12px; padding: 6px 12px; }

  .stats {
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .output-title { font-size: 13px; font-weight: 600; color: var(--text-muted); }

  .qr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  .qr-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s;
  }

  .qr-card:hover { border-color: var(--border-strong); }

  .qr-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .qr-index {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 8px;
    border-radius: 6px;
    font-family: var(--mono);
  }

  .qr-chars { font-size: 11px; color: var(--text-faint); font-family: var(--mono); }

  .qr-canvas-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff;
    border-radius: var(--radius);
    padding: 10px;
    border: 1px solid var(--border);
    min-height: 320px;
  }

  .qr-canvas-wrap canvas { display: block; width: 100%; height: auto; }

  .qr-preview {
    font-size: 11px;
    color: var(--text-faint);
    font-family: var(--mono);
    line-height: 1.5;
    max-height: 56px;
    overflow: hidden;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-faint);
    font-size: 14px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-lg);
  }

  .empty-icon { font-size: 32px; margin-bottom: 0.75rem; opacity: 0.4; }
  .hint { font-size: 12px; color: var(--text-faint); margin-top: 8px; }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="wordmark">QR Splitter</div>
    <h1>Text <span>&#8594;</span> QR codes</h1>
    <p class="subtitle">Paste long text and split it into scannable QR codes &mdash; paragraphs are never cut in the middle.</p>
  </header>

  <div class="card">
    <div class="card-label-row">
      <div class="card-label">Your text</div>
      <button type="button" class="btn-paste" id="pasteBtn" onclick="pasteFromClipboard()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
        <span id="pasteBtnLabel">Paste</span>
      </button>
    </div>
    <div class="paste-hint">Or long-press the text box below and tap Paste</div>
    <textarea id="inputText" placeholder="Paste or type your text here..." spellcheck="false"></textarea>
    <div class="controls">
      <div class="field">
        <label for="maxChars">Max chars per QR</label>
        <input type="number" id="maxChars" value="800" min="50" max="1500" step="50" />
      </div>
      <button class="btn btn-primary" onclick="generate()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="17" width="3" height="3"/><rect x="19" y="14" width="3" height="3"/><rect x="19" y="19" width="3" height="3"/></svg>
        Generate QR codes
      </button>

      <p class="hint">Tip: Ctrl + Enter to generate</p>
    </div>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="stat-label">Characters</div><div class="stat-value" id="statChars">&#8212;</div></div>
    <div class="stat"><div class="stat-label">QR codes</div><div class="stat-value" id="statCodes">&#8212;</div></div>
    <div class="stat"><div class="stat-label">Paragraphs</div><div class="stat-value" id="statParas">&#8212;</div></div>
  </div>

  <div id="outputWrap">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">&#9638;</div>
      <div>Your QR codes will appear here</div>
    </div>
    <div id="outputHeader" style="display:none;" class="output-header">
      <div class="output-title" id="outputTitle"></div>
    </div>
    <div class="qr-grid" id="output"></div>
  </div>

</div>

<script>
// ─── QR encoder — pure JS, no external library ────────────────────────────
// Based on the reference implementation by Kazuhiko Arase (MIT licence).
// Inlined here so the page works fully offline and handles every character.

var QRErrorCorrectLevel = { L: 1, M: 0, Q: 3, H: 2 };

function QRCode(el, options) {
  if (typeof options === 'string') options = { text: options };
  this._el = el;
  this._options = Object.assign({ width: 200, height: 200, correctLevel: QRErrorCorrectLevel.M }, options);
  this._makeCode(this._options.text);
}

QRCode.CorrectLevel = QRErrorCorrectLevel;

QRCode.prototype._makeCode = function(text) {
  var utf8 = unescape(encodeURIComponent(text));
  var qr = qrcode(0, 'M');
  qr.addData(utf8, 'Byte');
  qr.make();
  var canvas = document.createElement('canvas');
  var size = this._options.width;
  var count = qr.getModuleCount();
  var cell = Math.floor(size / (count + 4));
  var margin = Math.floor((size - cell * count) / 2);
  canvas.width = size;
  canvas.height = size;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#000000';
  for (var row = 0; row < count; row++) {
    for (var col = 0; col < count; col++) {
      if (qr.isDark(row, col)) {
        ctx.fillRect(margin + col * cell, margin + row * cell, cell, cell);
      }
    }
  }
  this._canvas = canvas;
  this._el.appendChild(canvas);
};

QRCode.prototype.getCanvas = function() { return this._canvas; };

// ─── qrcode core (Kazuhiko Arase, MIT) ───────────────────────────────────
var qrcode = (function() {
  var qrcode = function(typeNumber, errorCorrectionLevel) {
    var PAD0 = 0xEC, PAD1 = 0x11;
    var _typeNumber = typeNumber, _errorCorrectionLevel = QRErrorCorrectLevel[errorCorrectionLevel];
    var _modules = null, _moduleCount = 0, _dataCache = null, _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {
      _moduleCount = _typeNumber * 4 + 17;
      _modules = (function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var i = 0; i < moduleCount; i++) {
          modules[i] = new Array(moduleCount);
          for (var j = 0; j < moduleCount; j++) modules[i][j] = null;
        }
        return modules;
      }(_moduleCount));
      setupPositionProbePattern(0, 0); setupPositionProbePattern(_moduleCount - 7, 0); setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern(); setupTimingPattern();
      setupTypeInfo(test, maskPattern);
      if (_typeNumber >= 7) setupTypeNumber(test);
      if (_dataCache == null) _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {
      for (var r = -1; r <= 7; r++) {
        if (row + r <= -1 || _moduleCount <= row + r) continue;
        for (var c = -1; c <= 7; c++) {
          if (col + c <= -1 || _moduleCount <= col + c) continue;
          if ((0 <= r && r <= 6 && (c == 0 || c == 6)) || (0 <= c && c <= 6 && (r == 0 || r == 6)) || (2 <= r && r <= 4 && 2 <= c && c <= 4))
            _modules[row + r][col + c] = true;
          else _modules[row + r][col + c] = false;
        }
      }
    };

    var getBestMaskPattern = function() {
      var minLostPoint = 0, pattern = 0;
      for (var i = 0; i < 8; i++) {
        makeImpl(true, i);
        var lostPoint = QRLostPoint.getLostPoint(_this);
        if (i == 0 || minLostPoint > lostPoint) { minLostPoint = lostPoint; pattern = i; }
      }
      return pattern;
    };

    var setupTimingPattern = function() {
      for (var r = 8; r < _moduleCount - 8; r++) { if (_modules[r][6] != null) continue; _modules[r][6] = (r % 2 == 0); }
      for (var c = 8; c < _moduleCount - 8; c++) { if (_modules[6][c] != null) continue; _modules[6][c] = (c % 2 == 0); }
    };

    var setupPositionAdjustPattern = function() {
      var pos = QRPatternLocator.getPatternPosition(_typeNumber);
      for (var i = 0; i < pos.length; i++) {
        for (var j = 0; j < pos.length; j++) {
          var row = pos[i], col = pos[j];
          if (_modules[row][col] != null) continue;
          for (var r = -2; r <= 2; r++) {
            for (var c = -2; c <= 2; c++) {
              if (r == -2 || r == 2 || c == -2 || c == 2 || (r == 0 && c == 0)) _modules[row + r][col + c] = true;
              else _modules[row + r][col + c] = false;
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {
      var bits = QRUtil.getBCHTypeNumber(_typeNumber);
      for (var i = 0; i < 18; i++) {
        var mod = (!test && ((bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }
      for (var i = 0; i < 18; i++) {
        var mod = (!test && ((bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {
      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);
      for (var i = 0; i < 15; i++) {
        var mod = (!test && ((bits >> i) & 1) == 1);
        if (i < 6) _modules[i][8] = mod;
        else if (i < 8) _modules[i + 1][8] = mod;
        else _modules[_moduleCount - 15 + i][8] = mod;
      }
      for (var i = 0; i < 15; i++) {
        var mod = (!test && ((bits >> i) & 1) == 1);
        if (i < 8) _modules[8][_moduleCount - i - 1] = mod;
        else if (i < 9) _modules[8][15 - i - 1 + 1] = mod;
        else _modules[8][15 - i - 1] = mod;
      }
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {
      var inc = -1, row = _moduleCount - 1, bitIndex = 7, byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);
      for (var col = _moduleCount - 1; col > 0; col -= 2) {
        if (col == 6) col--;
        while (true) {
          for (var c = 0; c < 2; c++) {
            if (_modules[row][col - c] == null) {
              var dark = false;
              if (byteIndex < data.length) dark = (((data[byteIndex] >>> bitIndex) & 1) == 1);
              var mask = maskFunc(row, col - c);
              if (mask) dark = !dark;
              _modules[row][col - c] = dark;
              bitIndex--;
              if (bitIndex == -1) { byteIndex++; bitIndex = 7; }
            }
          }
          row += inc;
          if (row < 0 || _moduleCount <= row) { row -= inc; inc = -inc; break; }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {
      var offset = 0, maxDcCount = 0, maxEcCount = 0;
      var dcdata = new Array(rsBlocks.length), ecdata = new Array(rsBlocks.length);
      for (var r = 0; r < rsBlocks.length; r++) {
        var dcCount = rsBlocks[r].dataCount, ecCount = rsBlocks[r].totalCount - dcCount;
        maxDcCount = Math.max(maxDcCount, dcCount); maxEcCount = Math.max(maxEcCount, ecCount);
        dcdata[r] = new Array(dcCount);
        for (var i = 0; i < dcdata[r].length; i++) dcdata[r][i] = 0xff & buffer.buffer[offset++];
        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount), rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);
        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i++) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0) ? modPoly.getAt(modIndex) : 0;
        }
      }
      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i++) totalCodeCount += rsBlocks[i].totalCount;
      var data = new Array(totalCodeCount), index = 0;
      for (var i = 0; i < maxDcCount; i++) for (var r = 0; r < rsBlocks.length; r++) if (i < dcdata[r].length) data[index++] = dcdata[r][i];
      for (var i = 0; i < maxEcCount; i++) for (var r = 0; r < rsBlocks.length; r++) if (i < ecdata[r].length) data[index++] = ecdata[r][i];
      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {
      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);
      var buffer = qrBitBuffer();
      for (var i = 0; i < dataList.length; i++) { var data = dataList[i]; buffer.put(data.getMode(), 4); buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber)); data.write(buffer); }
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i++) totalDataCount += rsBlocks[i].dataCount;
      if (buffer.getLengthInBits() > totalDataCount * 8) throw new Error('code length overflow');
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) buffer.put(0, 4);
      while (buffer.getLengthInBits() % 8 != 0) buffer.putBit(false);
      while (true) {
        if (buffer.getLengthInBits() >= totalDataCount * 8) break;
        buffer.put(PAD0, 8);
        if (buffer.getLengthInBits() >= totalDataCount * 8) break;
        buffer.put(PAD1, 8);
      }
      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {
      mode = mode || 'Byte';
      var newData;
      switch (mode) {
        case 'Numeric': newData = qrNumber(data); break;
        case 'Alphanumeric': newData = qrAlphaNum(data); break;
        case 'Byte': newData = qr8BitByte(data); break;
        case 'Kanji': newData = qrKanji(data); break;
        default: throw new Error('mode:' + mode);
      }
      _dataList.push(newData); _dataCache = null;
    };

    _this.isDark = function(row, col) { if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) throw new Error(row + ',' + col); return _modules[row][col]; };
    _this.getModuleCount = function() { return _moduleCount; };

// ─── Render a QR into a canvas element ───────────────────────────────────
function renderQR(text, canvasEl, size) {
  // Convert text to UTF-8 byte string so non-ASCII chars encode correctly
  var utf8str = unescape(encodeURIComponent(text));
  var qr = qrcode(0, 'M');
  qr.addData(utf8str, 'Byte');
  qr.make();

  var count = qr.getModuleCount();

  // Step 1: draw at native 1px-per-module onto a small offscreen canvas
  var raw = document.createElement('canvas');
  raw.width = count;
  raw.height = count;
  var rctx = raw.getContext('2d');
  rctx.fillStyle = '#ffffff';
  rctx.fillRect(0, 0, count, count);
  rctx.fillStyle = '#000000';
  for (var row = 0; row < count; row++) {
    for (var col = 0; col < count; col++) {
      if (qr.isDark(row, col)) rctx.fillRect(col, row, 1, 1);
    }
  }

  // Step 2: scale up to the target size with a fixed quiet-zone margin
  var margin = Math.round(size * 0.04);
  var inner = size - margin * 2;
  canvasEl.width = size;
  canvasEl.height = size;
  var ctx = canvasEl.getContext('2d');
  ctx.imageSmoothingEnabled = false; // keep pixels crisp
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, size, size);
  ctx.drawImage(raw, margin, margin, inner, inner);
}

// ─── Main generate ────────────────────────────────────────────────────────
function generate() {
  var text = document.getElementById('inputText').value.trim();
  var maxChars = parseInt(document.getElementById('maxChars').value) || 800;
  var output = document.getElementById('output');
  output.innerHTML = '';

  if (!text) {
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('emptyState').innerHTML = '<div class="empty-icon">&#9638;</div><div>Please enter some text first.</div>';
    document.getElementById('outputHeader').style.display = 'none';
    document.getElementById('stats').style.display = 'none';
    return;
  }

  document.getElementById('emptyState').style.display = 'none';
  var chunks = splitTextIntoParagraphChunks(text, maxChars);
  var paragraphs = text.split(/\n\s*\n/).filter(function(p) { return p.trim().length > 0; });

  document.getElementById('statChars').textContent = text.length.toLocaleString();
  document.getElementById('statCodes').textContent = chunks.length;
  document.getElementById('statParas').textContent = paragraphs.length;
  document.getElementById('stats').style.display = 'grid';
  document.getElementById('outputHeader').style.display = 'flex';
  document.getElementById('outputTitle').textContent = chunks.length + ' QR code' + (chunks.length !== 1 ? 's' : '') + ' generated';

  chunks.forEach(function(chunk, idx) {
    var card = document.createElement('div');
    card.className = 'qr-card';

    var header = document.createElement('div');
    header.className = 'qr-card-header';
    header.innerHTML = '<span class="qr-index">' + (idx + 1) + ' / ' + chunks.length + '</span><span class="qr-chars">' + chunk.length + ' chars</span>';

    var qrWrap = document.createElement('div');
    qrWrap.className = 'qr-canvas-wrap';
    qrWrap.id = 'qr-' + idx;

    var canvas = document.createElement('canvas');
    qrWrap.appendChild(canvas);

    var preview = document.createElement('div');
    preview.className = 'qr-preview';
    preview.textContent = chunk.substring(0, 110) + (chunk.length > 110 ? '...' : '');

    card.appendChild(header);
    card.appendChild(qrWrap);
    card.appendChild(preview);
    output.appendChild(card);

    setTimeout(function(c, cv) {
      return function() {
        try {
          renderQR(c, cv, 300);
        } catch(e) {
          cv.parentNode.innerHTML = '<div style="font-size:12px;color:#c0392b;padding:10px;text-align:center;">Error: ' + e.message + '</div>';
        }
      };
    }(chunk, canvas), idx * 40);
  });
}


document.getElementById('inputText').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) generate();
});

// ─── Paste from clipboard ─────────────────────────────────────────────────
function pasteFromClipboard() {
  var textarea = document.getElementById('inputText');
  var btn = document.getElementById('pasteBtn');
  var label = document.getElementById('pasteBtnLabel');

  function showPasted() {
    btn.classList.add('pasted');
    var prevLabel = label.textContent;
    label.textContent = 'Pasted!';
    setTimeout(function() {
      btn.classList.remove('pasted');
      label.textContent = prevLabel;
    }, 1200);
  }

  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(function(text) {
      if (text) {
        textarea.value = text;
        textarea.focus();
        showPasted();
      }
    }).catch(function() {
      // Permission denied or unavailable — fall back to focusing the textarea
      // so the user can paste manually with Ctrl/Cmd+V.
      textarea.focus();
      label.textContent = 'Press ⌘/Ctrl+V';
      setTimeout(function() { label.textContent = 'Paste'; }, 1800);
    });
  } else {
    textarea.focus();
    label.textContent = 'Press ⌘/Ctrl+V';
    setTimeout(function() { label.textContent = 'Paste'; }, 1800);
  }
}
